<script>
window.onerror = function(msg, src, line, col, err) {
    const div = document.getElementById('errors');
    div.textContent += '❌ ERROR: ' + msg + '\n   at ' + src + ':' + line + ':' + col + '\n\n';
    return false;
};
window.addEventListener('unhandledrejection', e => {
    const div = document.getElementById('errors');
    div.textContent += '❌ PROMISE REJECTION: ' + e.reason + '\n\n';
});
</script>
<script src="fund_data.js"></script>
<script src="app_v4.4.js"></script>
<script>
setTimeout(() => {
    const div = document.getElementById('errors');
    const btn = document.getElementById('library-open-btn');
    const inp = document.getElementById('depot-upload-input');
    if (div.textContent.trim() === '') {
        document.getElementById('ok').style.display = 'block';
        document.getElementById('errors').textContent = 
            'library-open-btn has onclick: ' + (btn && btn.onclick !== null ? 'yes' : 'no') + '\n' +
            'library-open-btn listeners: checking...\n';
    }
}, 500);
</script>
